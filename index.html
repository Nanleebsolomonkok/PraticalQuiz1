<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Interior Scene - A-Frame</title>
    <!-- A-Frame Library -->
    <script src="script/script.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.2rem;
            background: rgba(143, 15, 15, 0.9);
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="loading">Loading Elegant Interior...</div>
    
    <a-scene background="color: #faf8f5" fog="type: exponential; color: #faf8f5; density: 0.015" renderer="antialias: true;
    colorManagement: true; highRefreshRate: true">
        
        <!-- Assets -->
        <a-assets>
            <!-- Procedural Wood Texture - Dark Walnut -->
            <canvas id="wood-canvas" width="512" height="512"></canvas>
            
            <!-- Procedural Floor Texture - Herringbone Pattern -->
            <canvas id="floor-canvas" width="1024" height="1024"></canvas>
            
            <!-- Procedural Wall Texture - Subtle Plaster -->
            <canvas id="wall-canvas" width="512" height="512"></canvas>
            
            <!-- Procedural Fabric Texture for Table Runner -->
            <canvas id="fabric-canvas" width="256" height="256"></canvas>
            
            <!-- MiLo Label -->
            <canvas id="milo-canvas" width="512" height="256"></canvas>
            <!-- Milk Label -->
            <canvas id="milk-canvas" width="512" height="256"></canvas>
            <!-- Tea/Coffee Label for cups -->
            <canvas id="tea-canvas" width="128" height="128"></canvas>
        </a-assets>

        <!-- Lighting Setup - Three Point Lighting -->
        <!-- Key Light - Warm Sunlight -->
        <a-entity light="type: directional; color: #fff8e7; intensity: 1.2; castShadow: true; shadowMapWidth: 2048; shadowMapHeight: 2048; shadowBias: -0.001" position="-8 12 -8" rotation="-45 45 0"></a-entity>
        
        <!-- Fill Light - Soft Blue from Window -->
        <a-entity light="type: directional; color: #e8f4ff; intensity: 0.4" position="0 8 -10" rotation="-30 0 0"></a-entity>
        
        <!-- Ambient Light -->
        <a-entity light="type: ambient; color: #ffffff; intensity: 0.3"></a-entity>
        
        <!-- Rim Light - Warm accent -->
        <a-entity light="type: point; color: #ffd4a3; intensity: 0.6; distance: 15" position="5 4 5"></a-entity>

        <!-- Room Architecture -->
        <!-- Floor - Herringbone Wood -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="25" height="25" 
                 material="src: #floor-canvas; roughness: 0.6; metalness: 0.1; repeat: 5 5" 
                 shadow="receive: true; cast: false"></a-plane>
        
        <!-- Baseboards -->
        <a-box position="0 0.05 -4.95" width="25" height="0.1" depth="0.1" color="#f5f5f0"></a-box>
        <a-box position="-4.95 0.05 0" rotation="0 90 0" width="25" height="0.1" depth="0.1" color="#f5f5f0"></a-box>
        
        <!-- Back Wall with Wainscoting -->
        <a-plane position="0 2.5 -5" width="25" height="5" 
                 material="src: #wall-canvas; roughness: 0.9; color: #f8f6f3" shadow="receive: true"></a-plane>
        <!-- Chair Rail -->
        <a-box position="0 1.2 -4.98" width="25" height="0.08" depth="0.04" color="#e8e4df"></a-box>
        
        <!-- Side Wall -->
        <a-plane position="-5 2.5 0" rotation="0 90 0" width="25" height="5" 
                 material="src: #wall-canvas; roughness: 0.9; color: #f8f6f3" shadow="receive: true"></a-plane>

        <!-- Large Window with Frame -->
        <a-entity position="0 3 -4.9">
            <!-- Window Frame -->
            <a-box width="4" height="3" depth="0.15" color="#2c2c2c"></a-box>
            <!-- Glass -->
            <a-plane position="0 0 0.08" width="3.7" height="2.7" 
                     material="color: #a8d4f0; opacity: 0.3; transparent: true; roughness: 0; metalness: 0.8; side: double"></a-plane>
            <!-- Window Grid -->
            <a-box position="0 0 0.08" width="0.05" height="2.7" depth="0.02" color="#2c2c2c"></a-box>
            <a-box position="0 0 0.08" width="3.7" height="0.05" depth="0.02" color="#2c2c2c"></a-box>
            <!-- Window Sill -->
            <a-box position="0 -1.6 0.15" width="4.2" height="0.1" depth="0.3" color="#e8e4df"></a-box>
            <!-- Curtains -->
            <a-plane position="-2.2 0 0.2" width="1.5" height="3.2" rotation="0 15 0"
                     material="color: #f5f0e8; roughness: 0.9; side: double"></a-plane>
            <a-plane position="2.2 0 0.2" width="1.5" height="3.2" rotation="0 -15 0"
                     material="color: #f5f0e8; roughness: 0.9; side: double"></a-plane>
            <!-- Tie backs -->
            <a-torus position="-1.5 0 0.25" radius="0.15" radius-tubular="0.03" arc="180" rotation="0 0 90"
                     material="color: #8b4513; roughness: 0.8"></a-torus>
            <a-torus position="1.5 0 0.25" radius="0.15" radius-tubular="0.03" arc="180" rotation="0 0 90"
                     material="color: #8b4513; roughness: 0.8"></a-torus>
        </a-entity>

        <!-- Area Rug -->
        <a-entity position="0 0.01 0">
            <a-plane rotation="-90 0 0" width="6" height="4" 
                     material="color: #e8ddd0; roughness: 1; metalness: 0" shadow="receive: true"></a-plane>
            <!-- Rug Border -->
            <a-ring rotation="-90 0 0" radius-inner="2.9" radius-outer="3" 
                    material="color: #8b4513; roughness: 1"></a-ring>
        </a-entity>

        <!-- ELEGANT DINING TABLE -->
        <a-entity position="0 0 0">
            <!-- Table Top - Rounded edges simulation with multiple boxes -->
            <a-box position="0 0.76 0" width="2.4" height="0.04" depth="1.6" 
                   material="src: #wood-canvas; roughness: 0.5; metalness: 0.15; color: #4a3728" 
                   shadow="cast: true; receive: true"></a-box>
            <!-- Table Edge -->
            <a-box position="0 0.74 0" width="2.42" height="0.04" depth="1.62" 
                   material="src: #wood-canvas; roughness: 0.5; metalness: 0.15; color: #3d2e21" 
                   shadow="cast: true"></a-box>
            
            <!-- Central Pedestal Base (elegant style) -->
            <a-cylinder position="0 0.38 0" radius="0.25" height="0.76" 
                        material="src: #wood-canvas; roughness: 0.5; metalness: 0.15; color: #4a3728" 
                        shadow="cast: true"></a-cylinder>
            <!-- Base Foot -->
            <a-cylinder position="0 0.05 0" radius="0.5" height="0.1" 
                        material="src: #wood-canvas; roughness: 0.5; metalness: 0.15; color: #4a3728" 
                        shadow="cast: true"></a-cylinder>
            
            <!-- Elegant Table Runner - Linen texture -->
            <a-plane position="0 0.781 0" rotation="-90 0 0" width="2.2" height="0.5" 
                     material="src: #fabric-canvas; roughness: 0.9; metalness: 0; color: #d4c4b0" 
                     shadow="receive: true"></a-plane>
            <!-- Runner decorative ends -->
            <a-box position="0 0.782 -0.2" width="2.2" height="0.01" depth="0.02" color="#8b4513"></a-box>
            <a-box position="0 0.782 0.2" width="2.2" height="0.01" depth="0.02" color="#8b4513"></a-box>
        </a-entity>

        <!-- ELEGANT CHAIR 1 (Front Left) -->
        <a-entity position="-0.8 0 1.3" rotation="0 -15 0">
            <!-- Seat Cushion -->
            <a-box position="0 0.48 0" width="0.55" height="0.08" depth="0.55" 
                   material="color: #722f37; roughness: 0.8" shadow="cast: true"></a-box>
            <!-- Seat Base -->
            <a-box position="0 0.44 0" width="0.52" height="0.04" depth="0.52" 
                   material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-box>
            
            <!-- Chair Legs - Tapered -->
            <a-cylinder position="-0.22 0.22 -0.22" radius="0.02" height="0.44" radius-bottom="0.015" radius-top="0.025"
                        material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.22 0.22 -0.22" radius="0.02" height="0.44" radius-bottom="0.015" radius-top="0.025"
                        material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.22 0.22 -0.22" radius="0.02" height="0.44" radius-bottom="0.015" radius-top="0.025"
                        material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.22 0.22 0.22" radius="0.02" height="0.44" radius-bottom="0.015" radius-top="0.025"
                        material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.22 0.22 0.22" radius="0.02" height="0.44" radius-bottom="0.015" radius-top="0.025"
                        material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-cylinder>
            
            <!-- Backrest - Curved top -->
            <a-box position="0 0.75 -0.22" width="0.55" height="0.55" depth="0.06" 
                   material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-box>
            <!-- Backrest Cushion -->
            <a-box position="0 0.75 -0.19" width="0.5" height="0.5" depth="0.04" 
                   material="color: #722f37; roughness: 0.8" shadow="cast: true"></a-box>
            <!-- Decorative top rail -->
            <a-box position="0 1.03 -0.22" width="0.55" height="0.06" depth="0.08" 
                   material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-box>
        </a-entity>

        <!-- ELEGANT CHAIR 2 (Front Right) -->
        <a-entity position="0.8 0 1.3" rotation="0 15 0">
            <!-- Seat Cushion -->
            <a-box position="0 0.48 0" width="0.55" height="0.08" depth="0.55" 
                   material="color: #722f37; roughness: 0.8" shadow="cast: true"></a-box>
            <!-- Seat Base -->
            <a-box position="0 0.44 0" width="0.52" height="0.04" depth="0.52" 
                   material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-box>
            
            <!-- Chair Legs -->
            <a-cylinder position="-0.22 0.22 -0.22" radius="0.02" height="0.44" radius-bottom="0.015" radius-top="0.025"
                        material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.22 0.22 -0.22" radius="0.02" height="0.44" radius-bottom="0.015" radius-top="0.025"
                        material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.22 0.22 0.22" radius="0.02" height="0.44" radius-bottom="0.015" radius-top="0.025"
                        material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.22 0.22 0.22" radius="0.02" height="0.44" radius-bottom="0.015" radius-top="0.025"
                        material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-cylinder>
            
            <!-- Backrest -->
            <a-box position="0 0.75 -0.22" width="0.55" height="0.55" depth="0.06" 
                   material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-box>
            <!-- Backrest Cushion -->
            <a-box position="0 0.75 -0.19" width="0.5" height="0.5" depth="0.04" 
                   material="color: #722f37; roughness: 0.8" shadow="cast: true"></a-box>
            <!-- Decorative top rail -->
            <a-box position="0 1.03 -0.22" width="0.55" height="0.06" depth="0.08" 
                   material="src: #wood-canvas; color: #4a3728" shadow="cast: true"></a-box>
        </a-entity>

        <!-- MiLo TIN - Premium Packaging -->
        <a-entity position="-0.4 0.78 -0.1">
            <!-- Main Body -->
            <a-cylinder radius="0.11" height="0.28" 
                        material="color: #1a472a; roughness: 0.3; metalness: 0.4" shadow="cast: true"></a-cylinder>
            <!-- Label Area -->
            <a-cylinder radius="0.112" height="0.2" theta-start="0" theta-length="360"
                        material="src: #milo-canvas; roughness: 0.4; metalness: 0.3; transparent: true; opacity: 0.95" 
                        position="0 0.02 0"></a-cylinder>
            <!-- Gold Accent Bands -->
            <a-torus position="0 0.1 0" radius="0.11" radius-tubular="0.005" rotation="90 0 0"
                     material="color: #ffd700; roughness: 0.2; metalness: 0.9"></a-torus>
            <a-torus position="0 -0.05 0" radius="0.11" radius-tubular="0.005" rotation="90 0 0"
                     material="color: #ffd700; roughness: 0.2; metalness: 0.9"></a-torus>
            <!-- Metal Lid -->
            <a-cylinder position="0 0.145 0" radius="0.115" height="0.025" 
                        material="color: #c0c0c0; roughness: 0.2; metalness: 0.95" shadow="cast: true"></a-cylinder>
            <!-- Lid Detail -->
            <a-cylinder position="0 0.16 0" radius="0.08" height="0.01" 
                        material="color: #a0a0a0; roughness: 0.3; metalness: 0.8"></a-cylinder>
        </a-entity>

        <!-- MILK TIN - Premium Packaging -->
        <a-entity position="-0.75 0.78 0.05">
            <!-- Main Body -->
            <a-cylinder radius="0.09" height="0.24" 
                        material="color: #1e3a8a; roughness: 0.3; metalness: 0.4" shadow="cast: true"></a-cylinder>
            <!-- Label Area -->
            <a-cylinder radius="0.092" height="0.18" theta-start="0" theta-length="360"
                        material="src: #milk-canvas; roughness: 0.4; metalness: 0.3; transparent: true; opacity: 0.95"
                        position="0 0.01 0"></a-cylinder>
            <!-- Silver Accent -->
            <a-torus position="0 0.08 0" radius="0.09" radius-tubular="0.004" rotation="90 0 0"
                     material="color: #c0c0c0; roughness: 0.2; metalness: 0.9"></a-torus>
            <!-- Metal Lid -->
            <a-cylinder position="0 0.125 0" radius="0.095" height="0.02" 
                        material="color: #c0c0c0; roughness: 0.2; metalness: 0.95" shadow="cast: true"></a-cylinder>
        </a-entity>

        <!-- ELEGANT CUP 1 - Fine China -->
        <a-entity position="0.25 0.78 0.15" rotation="0 30 0">
            <!-- Cup Body - Tapered elegant shape -->
            <a-cylinder radius="0.055" height="0.08" radius-bottom="0.04" radius-top="0.06"
                        material="color: #fafafa; roughness: 0.1; metalness: 0.1" shadow="cast: true"></a-cylinder>
            <!-- Cup Interior -->
            <a-cylinder position="0 0.041 0" radius="0.054" height="0.001" radius-bottom="0.039" radius-top="0.059"
                        material="color: #f0f0f0; roughness: 0.2" side="double"></a-cylinder>
            <!-- Gold Rim -->
            <a-torus position="0 0.04 0" radius="0.06" radius-tubular="0.003" rotation="90 0 0"
                     material="color: #ffd700; roughness: 0.2; metalness: 0.9"></a-torus>
            <!-- Elegant Handle -->
            <a-torus position="0.065 0.04 0" radius="0.025" radius-tubular="0.006" arc="200" rotation="0 0 -100"
                     material="color: #fafafa; roughness: 0.1"></a-torus>
            <!-- Gold Handle Accent -->
            <a-sphere position="0.065 0.065 0" radius="0.008" color="#ffd700" roughness="0.2" metalness="0.9"></a-sphere>
            <!-- Coffee -->
            <a-circle position="0 0.075 0" rotation="-90 0 0" radius="0.045" 
                      material="color: #3d2817; roughness: 0.6" shadow="receive: true"></a-circle>
            <!-- Steam (subtle) -->
            <a-entity position="0 0.12 0">
                <a-sphere radius="0.02" color="#ffffff" opacity="0.2" transparent="true" position="0 0 0"
                          animation="property: position; to: 0 0.1 0; dur: 2000; loop: true; easing: easeInOutSine"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- ELEGANT CUP 2 - Fine China -->
        <a-entity position="0.55 0.78 -0.05" rotation="0 -20 0">
            <!-- Cup Body -->
            <a-cylinder radius="0.055" height="0.08" radius-bottom="0.04" radius-top="0.06"
                        material="color: #fafafa; roughness: 0.1; metalness: 0.1" shadow="cast: true"></a-cylinder>
            <!-- Cup Interior -->
            <a-cylinder position="0 0.041 0" radius="0.054" height="0.001" radius-bottom="0.039" radius-top="0.059"
                        material="color: #f0f0f0; roughness: 0.2" side="double"></a-cylinder>
            <!-- Gold Rim -->
            <a-torus position="0 0.04 0" radius="0.06" radius-tubular="0.003" rotation="90 0 0"
                     material="color: #ffd700; roughness: 0.2; metalness: 0.9"></a-torus>
            <!-- Elegant Handle -->
            <a-torus position="0.065 0.04 0" radius="0.025" radius-tubular="0.006" arc="200" rotation="0 0 -100"
                     material="color: #fafafa; roughness: 0.1"></a-torus>
            <!-- Gold Handle Accent -->
            <a-sphere position="0.065 0.065 0" radius="0.008" color="#ffd700" roughness="0.2" metalness="0.9"></a-sphere>
            <!-- Coffee -->
            <a-circle position="0 0.075 0" rotation="-90 0 0" radius="0.045" 
                      material="color: #3d2817; roughness: 0.6" shadow="receive: true"></a-circle>
        </a-entity>

        <!-- DECORATIVE CENTERPIECE - Crystal Vase with Flowers -->
        <a-entity position="0 0.78 0">
            <!-- Crystal Vase -->
            <a-sphere position="0 0.15 0" radius="0.12" scale="0.8 1.2 0.8"
                      material="color: #ffffff; roughness: 0; metalness: 0; transmission: 0.9; thickness: 0.15; transparent: true; opacity: 0.4; ior: 1.5" 
                      shadow="cast: true"></a-sphere>
            <!-- Vase Base -->
            <a-cylinder position="0 0.02 0" radius="0.08" height="0.04" 
                        material="color: #ffffff; roughness: 0.1; transmission: 0.8; transparent: true; opacity: 0.5"></a-cylinder>
            <!-- Water -->
            <a-cylinder position="0 0.08 0" radius="0.1" height="0.12" 
                        material="color: #a8d4f0; opacity: 0.4; transparent: true; roughness: 0.1"></a-cylinder>
            
            <!-- Flower Stems -->
            <a-cylinder position="-0.03 0.35 0" radius="0.008" height="0.5" rotation="0 0 -8"
                        material="color: #228b22; roughness: 0.8"></a-cylinder>
            <a-cylinder position="0.03 0.4 0.03" radius="0.008" height="0.6" rotation="5 0 5"
                        material="color: #228b22; roughness: 0.8"></a-cylinder>
            <a-cylinder position="0 0.38 -0.03" radius="0.008" height="0.55" rotation="-3 0 0"
                        material="color: #228b22; roughness: 0.8"></a-cylinder>
            
            <!-- White Roses -->
            <a-entity position="-0.05 0.6 0" rotation="0 0 -10">
                <a-sphere radius="0.08" color="#fff5f5" roughness="0.9" scale="1 0.8 1"></a-sphere>
                <a-sphere position="0 0.02 0" radius="0.06" color="#ffe4e1" roughness="0.9" scale="1 0.6 1"></a-sphere>
            </a-entity>
            <a-entity position="0.05 0.65 0.05" rotation="5 0 8">
                <a-sphere radius="0.08" color="#fff5f5" roughness="0.9" scale="1 0.8 1"></a-sphere>
                <a-sphere position="0 0.02 0" radius="0.06" color="#ffe4e1" roughness="0.9" scale="1 0.6 1"></a-sphere>
            </a-entity>
            <a-entity position="0 0.58 -0.05" rotation="-5 0 0">
                <a-sphere radius="0.075" color="#fff5f5" roughness="0.9" scale="1 0.8 1"></a-sphere>
                <a-sphere position="0 0.02 0" radius="0.055" color="#ffe4e1" roughness="0.9" scale="1 0.6 1"></a-sphere>
            </a-entity>
            
            <!-- Leaves -->
            <a-entity position="-0.08 0.3 0" rotation="0 0 -30">
                <a-sphere radius="0.06" color="#228b22" roughness="0.8" scale="1.5 0.3 0.8"></a-sphere>
            </a-entity>
            <a-entity position="0.08 0.35 0.05" rotation="0 0 25">
                <a-sphere radius="0.06" color="#228b22" roughness="0.8" scale="1.5 0.3 0.8"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- Additional Decor - Small Plate with Cookies -->
        <a-entity position="0.3 0.78 -0.25">
            <!-- Plate -->
            <a-cylinder radius="0.15" height="0.01" 
                        material="color: #fafafa; roughness: 0.1" shadow="cast: true"></a-cylinder>
            <a-torus position="0 0.005 0" radius="0.14" radius-tubular="0.008" rotation="90 0 0"
                     material="color: #ffd700; roughness: 0.2; metalness: 0.9"></a-torus>
            <!-- Cookies -->
            <a-cylinder position="-0.05 0.01 0.05" radius="0.04" height="0.008" 
                        material="color: #d4a574; roughness: 0.9"></a-cylinder>
            <a-cylinder position="0.05 0.01 -0.03" radius="0.04" height="0.008" 
                        material="color: #d4a574; roughness: 0.9"></a-cylinder>
            <a-cylinder position="0 0.01 0.08" radius="0.04" height="0.008" 
                        material="color: #d4a574; roughness: 0.9"></a-cylinder>
        </a-entity>

        <!-- Wall Art -->
        <a-entity position="0 2.5 -4.95">
            <a-box width="1.5" height="2" depth="0.05" color="#2c2c2c"></a-box>
            <a-plane position="0 0 0.03" width="1.3" height="1.8" color="#f8f6f3"></a-plane>
            <!-- Abstract Art -->
            <a-circle position="-0.3 0.3 0.04" radius="0.25" color="#722f37" opacity="0.8"></a-circle>
            <a-box position="0.2 -0.2 0.04" width="0.4" height="0.3" depth="0.01" color="#1e3a8a" opacity="0.7" rotation="0 0 15"></a-box>
            <a-cylinder position="0 0.4 0.04" radius="0.15" height="0.01" color="#ffd700" rotation="90 0 0"></a-cylinder>
        </a-entity>

        <!-- Camera with smooth controls -->
        <a-entity position="3.5 2.5 4.5" rotation="-20 45 0">
            <a-camera look-controls="pointerLockEnabled: false" wasd-controls="acceleration: 100"></a-camera>
        </a-entity>

    </a-scene>

    <!-- Script to generate all procedural textures -->
    <script>
        // Wood Texture - Dark Walnut with grain
        const woodCanvas = document.getElementById('wood-canvas');
        const woodCtx = woodCanvas.getContext('2d');
        woodCtx.fillStyle = '#4a3728';
        woodCtx.fillRect(0, 0, 512, 512);
        // Add grain
        for(let i = 0; i < 2000; i++) {
            woodCtx.strokeStyle = `rgba(60, 45, 30, ${Math.random() * 0.3})`;
            woodCtx.lineWidth = 1 + Math.random() * 2;
            woodCtx.beginPath();
            const x = Math.random() * 512;
            woodCtx.moveTo(x, 0);
            woodCtx.lineTo(x + (Math.random() - 0.5) * 20, 512);
            woodCtx.stroke();
        }
        // Add knots
        for(let i = 0; i < 5; i++) {
            const x = Math.random() * 512;
            const y = Math.random() * 512;
            const radius = 10 + Math.random() * 20;
            const gradient = woodCtx.createRadialGradient(x, y, 0, x, y, radius);
            gradient.addColorStop(0, '#3d2e21');
            gradient.addColorStop(1, 'rgba(61, 46, 33, 0)');
            woodCtx.fillStyle = gradient;
            woodCtx.beginPath();
            woodCtx.arc(x, y, radius, 0, Math.PI * 2);
            woodCtx.fill();
        }

        // Herringbone Floor Pattern
        const floorCanvas = document.getElementById('floor-canvas');
        const floorCtx = floorCanvas.getContext('2d');
        floorCtx.fillStyle = '#e8ddd0';
        floorCtx.fillRect(0, 0, 1024, 1024);
        const plankWidth = 64;
        const plankHeight = 256;
        for(let row = 0; row < 8; row++) {
            for(let col = 0; col < 16; col++) {
                const x = col * plankWidth + (row % 2) * (plankWidth / 2);
                const y = row * (plankHeight / 2);
                const colorVar = Math.random() * 20;
                floorCtx.fillStyle = `rgb(${200 + colorVar}, ${180 + colorVar}, ${160 + colorVar})`;
                floorCtx.fillRect(x, y, plankWidth - 2, plankHeight / 2 - 2);
                // Add wood grain
                floorCtx.strokeStyle = `rgba(160, 140, 120, 0.3)`;
                floorCtx.lineWidth = 1;
                floorCtx.beginPath();
                floorCtx.moveTo(x + 10, y);
                floorCtx.lineTo(x + 10, y + plankHeight / 2);
                floorCtx.stroke();
            }
        }

        // Wall Texture - Subtle plaster
        const wallCanvas = document.getElementById('wall-canvas');
        const wallCtx = wallCanvas.getContext('2d');
        wallCtx.fillStyle = '#f8f6f3';
        wallCtx.fillRect(0, 0, 512, 512);
        // Add subtle noise
        for(let i = 0; i < 5000; i++) {
            wallCtx.fillStyle = `rgba(200, 195, 190, ${Math.random() * 0.1})`;
            wallCtx.fillRect(Math.random() * 512, Math.random() * 512, 2, 2);
        }

        // Fabric Texture - Linen
        const fabricCanvas = document.getElementById('fabric-canvas');
        const fabricCtx = fabricCanvas.getContext('2d');
        fabricCtx.fillStyle = '#d4c4b0';
        fabricCtx.fillRect(0, 0, 256, 256);
        // Add weave pattern
        for(let i = 0; i < 256; i += 4) {
            fabricCtx.strokeStyle = `rgba(139, 69, 19, ${0.1 + Math.random() * 0.1})`;
            fabricCtx.lineWidth = 1;
            fabricCtx.beginPath();
            fabricCtx.moveTo(0, i);
            fabricCtx.lineTo(256, i);
            fabricCtx.stroke();
            fabricCtx.beginPath();
            fabricCtx.moveTo(i, 0);
            fabricCtx.lineTo(i, 256);
            fabricCtx.stroke();
        }

        // MiLo Label - Premium Design
        const miloCanvas = document.getElementById('milo-canvas');
        const miloCtx = miloCanvas.getContext('2d');
        // Dark green gradient background
        const miloGrad = miloCtx.createLinearGradient(0, 0, 512, 0);
        miloGrad.addColorStop(0, '#0f291e');
        miloGrad.addColorStop(0.5, '#1a472a');
        miloGrad.addColorStop(1, '#0f291e');
        miloCtx.fillStyle = miloGrad;
        miloCtx.fillRect(0, 0, 512, 256);
        // Gold border
        miloCtx.strokeStyle = '#ffd700';
        miloCtx.lineWidth = 8;
        miloCtx.strokeRect(20, 20, 472, 216);
        // Inner border
        miloCtx.lineWidth = 2;
        miloCtx.strokeRect(30, 30, 452, 196);
        // MILO text with shadow
        miloCtx.shadowColor = 'rgba(0,0,0,0.5)';
        miloCtx.shadowBlur = 10;
        miloCtx.shadowOffsetX = 3;
        miloCtx.shadowOffsetY = 3;
        miloCtx.fillStyle = '#ffd700';
        miloCtx.font = 'bold 90px Georgia, serif';
        miloCtx.textAlign = 'center';
        miloCtx.textBaseline = 'middle';
        miloCtx.fillText('MILO', 256, 110);
        // Reset shadow
        miloCtx.shadowColor = 'transparent';
        // Subtitle
        miloCtx.font = 'italic 24px Georgia, serif';
        miloCtx.fillStyle = '#e8d5a8';
        miloCtx.fillText('Nutritious Malt Drink', 256, 160);
        // Decorative elements
        miloCtx.fillStyle = '#ffd700';
        miloCtx.fillRect(80, 200, 352, 3);
        miloCtx.beginPath();
        miloCtx.arc(60, 128, 15, 0, Math.PI * 2);
        miloCtx.arc(452, 128, 15, 0, Math.PI * 2);
        miloCtx.fill();

        // Milk Label - Premium Design
        const milkCanvas = document.getElementById('milk-canvas');
        const milkCtx = milkCanvas.getContext('2d');
        // Blue gradient background
        const milkGrad = milkCtx.createLinearGradient(0, 0, 512, 0);
        milkGrad.addColorStop(0, '#0d1b3e');
        milkGrad.addColorStop(0.5, '#1e3a8a');
        milkGrad.addColorStop(1, '#0d1b3e');
        milkCtx.fillStyle = milkGrad;
        milkCtx.fillRect(0, 0, 512, 256);
        // Silver border
        milkCtx.strokeStyle = '#c0c0c0';
        milkCtx.lineWidth = 8;
        milkCtx.strokeRect(20, 20, 472, 216);
        // Inner border
        milkCtx.lineWidth = 2;
        milkCtx.strokeRect(30, 30, 452, 196);
        // MILK text with shadow
        milkCtx.shadowColor = 'rgba(0,0,0,0.5)';
        milkCtx.shadowBlur = 10;
        milkCtx.shadowOffsetX = 3;
        milkCtx.shadowOffsetY = 3;
        milkCtx.fillStyle = '#ffffff';
        milkCtx.font = 'bold 90px Georgia, serif';
        milkCtx.textAlign = 'center';
        milkCtx.textBaseline = 'middle';
        milkCtx.fillText('MILK', 256, 110);
        // Reset shadow
        milkCtx.shadowColor = 'transparent';
        // Subtitle
        milkCtx.font = 'italic 24px Georgia, serif';
        milkCtx.fillStyle = '#d0d0d0';
        milkCtx.fillText('Fresh & Pure', 256, 160);
        // Decorative elements
        milkCtx.fillStyle = '#c0c0c0';
        milkCtx.fillRect(80, 200, 352, 3);
        milkCtx.beginPath();
        milkCtx.arc(60, 128, 15, 0, Math.PI * 2);
        milkCtx.arc(452, 128, 15, 0, Math.PI * 2);
        milkCtx.fill();

        // Remove loading screen
        document.getElementById('loading').style.display = 'none';
    </script>
</body>
</html>
